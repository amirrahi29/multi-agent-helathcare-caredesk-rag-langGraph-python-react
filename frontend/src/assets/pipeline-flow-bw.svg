<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1720 780" width="1720" height="780" role="img" aria-labelledby="flowTitle">
  <title id="flowTitle">Ingestion and runtime: multi-agent pipeline with agents and services</title>
  <defs>
