  <text x="388" y="588" fill="#475569" font-family="system-ui, sans-serif" font-size="10" font-weight="600">context into Query</text>

  <path d="M 1538 473 L 1538 722 L 180 722 L 180 542" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="12 10" stroke-linecap="round" marker-end="url(#arr)"/>
