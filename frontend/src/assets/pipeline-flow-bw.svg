    </g>
    <text x="96" y="294" fill="#0f172a" font-family="system-ui, sans-serif" font-weight="800" font-size="11" letter-spacing="0.1em">RUNTIME</text>
    <text x="96" y="308" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">Agents per message</text>
  </g>

