  <path d="M 916 376 L 952 376 L 952 289 L 962 289" fill="none" stroke="#0f172a" stroke-width="2.5" marker-end="url(#arr)"/>
  <path d="M 916 432 L 952 432 L 952 493 L 962 493" fill="none" stroke="#0f172a" stroke-width="2.5" marker-end="url(#arr)"/>

