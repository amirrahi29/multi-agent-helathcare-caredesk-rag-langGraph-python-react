  </defs>

  <rect x="0" y="0" width="1720" height="780" fill="#ffffff"/>

  <!-- Section labels: icon + text only (no outer box) -->
  <g>
    <g transform="translate(52 48)">
      <path fill="none" stroke="#0f172a" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round" transform="scale(0.72)" d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z M14 2v6h6"/>
    </g>
    <text x="96" y="64" fill="#0f172a" font-family="system-ui, sans-serif" font-weight="800" font-size="11" letter-spacing="0.12em">INGESTION</text>
    <text x="96" y="78" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">Data pipeline (offline)</text>
  </g>

  <g>
