<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="bot-metal" x1="12" y1="8" x2="52" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.95" />
      <stop offset="1" stop-color="#c7e9ff" stop-opacity="0.9" />
    </linearGradient>
    <linearGradient id="bot-accent" x1="20" y1="44" x2="44" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#93c5fd" />
      <stop offset="1" stop-color="#60a5fa" />
    </linearGradient>
  </defs>
  <!-- antenna -->
  <path d="M32 6v6M26 8l2 4M38 8l-2 4" stroke="url(#bot-metal)" stroke-width="2.2" stroke-linecap="round" />
  <circle cx="32" cy="5" r="2.8" fill="url(#bot-metal)" stroke="#fff" stroke-width="1" opacity="0.9" />
  <!-- head -->
  <rect x="16" y="12" width="32" height="26" rx="8" fill="url(#bot-metal)" stroke="#fff" stroke-width="1.5" opacity="0.92" />
  <!-- eyes -->
  <circle cx="26" cy="24" r="4" fill="#1e3a5f" />
  <circle cx="38" cy="24" r="4" fill="#1e3a5f" />
  <circle cx="27" cy="23" r="1.2" fill="#fff" opacity="0.85" />
  <circle cx="39" cy="23" r="1.2" fill="#fff" opacity="0.85" />
  <!-- mouth -->
  <path d="M26 32h12" stroke="#1e3a5f" stroke-width="2" stroke-linecap="round" />
  <!-- ears -->
  <rect x="10" y="20" width="6" height="10" rx="2" fill="url(#bot-metal)" stroke="#fff" stroke-width="1.2" opacity="0.85" />
  <rect x="48" y="20" width="6" height="10" rx="2" fill="url(#bot-metal)" stroke="#fff" stroke-width="1.2" opacity="0.85" />
  <!-- body -->
  <path d="M20 40h24v14a4 4 0 0 1-4 4H24a4 4 0 0 1-4-4V40z" fill="url(#bot-accent)" stroke="#fff" stroke-width="1.2" opacity="0.95" />
  <!-- chest panel -->
  <rect x="26" y="44" width="12" height="8" rx="2" fill="rgba(255,255,255,0.35)" />
  <circle cx="32" cy="48" r="2" fill="#fff" opacity="0.8" />
</svg>
